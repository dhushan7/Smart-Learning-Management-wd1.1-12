spring.application.name=Backend

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/smartLearning
spring.datasource.username=root
spring.datasource.password=97271
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# SERVER
server.port=8086

# OPENAI (optional)
openai.api.key=${OPENAI_API_KEY:}
openai.api.url=${OPENAI_API_URL:https://api.openai.com/v1/responses}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}

# SPRING SECURITY (basic login)
spring.security.user.name=admin
spring.security.user.password=1234

# EMAIL CONFIG
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=my@gmail.com
spring.mail.password=passkey
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
